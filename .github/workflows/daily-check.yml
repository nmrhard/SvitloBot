name: Daily Scheduler Check

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-daily-check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger internal daily check endpoint
        env:
          CHECK_API_KEY: ${{ secrets.CHECK_API_KEY }}
          CHECK_URL: ${{ secrets.CHECK_URL }}
        run: |
          if [ -z "$CHECK_API_KEY" ] || [ -z "$CHECK_URL" ]; then
            echo "Missing CHECK_API_KEY or CHECK_URL secret"
            exit 1
          fi

          MAX_RETRIES=3
          RETRY_DELAY=5
          TIMEOUT=30
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES..."
            
            if curl --fail --silent --show-error \
              --max-time $TIMEOUT \
              --connect-timeout 10 \
              --retry 2 \
              --retry-delay 3 \
              --retry-max-time 60 \
              -X POST "$CHECK_URL" \
              -H "x-api-key: $CHECK_API_KEY" \
              -H "Content-Type: application/json" \
              --data '{}'; then
              echo "✓ Check successful!"
              exit 0
            fi
            
            EXIT_CODE=$?
            echo "✗ Attempt $i failed with exit code $EXIT_CODE"
            
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
            fi
          done
          
          echo "All $MAX_RETRIES attempts failed"
          exit 1
